<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CFA Level I — Study Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:         #080c14;
  --bg2:        #0d1220;
  --bg3:        #111827;
  --surface:    #151d2e;
  --surface2:   #1c2840;
  --border:     #1f2d45;
  --border2:    #263449;
  --gold:       #f0b429;
  --gold2:      #ffd166;
  --gold-dim:   rgba(240,180,41,.12);
  --text:       #e8edf5;
  --text2:      #8b9ab5;
  --text3:      #5a6a84;
  --green:      #22d3a5;
  --green-dim:  rgba(34,211,165,.12);
  --red:        #f05252;
  --red-dim:    rgba(240,82,82,.12);
  --blue:       #60a5fa;
  --blue-dim:   rgba(96,165,250,.12);
  --sidebar-w:  240px;
  --radius:     12px;
  --radius-sm:  8px;
  --shadow:     0 4px 24px rgba(0,0,0,.4);
  --transition: .18s cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;overflow-x:hidden}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── Sidebar ── */
#sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);height:100vh;position:fixed;top:0;left:0;
  background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;z-index:100;
  transition:transform var(--transition);overflow-y:auto;
}
.sidebar-logo{padding:20px 18px 14px;border-bottom:1px solid var(--border)}
.sidebar-logo h2{font-family:'DM Serif Display',serif;font-size:1.15rem;color:var(--gold);letter-spacing:.02em}
.sidebar-logo small{color:var(--text3);font-size:.72rem;font-family:'JetBrains Mono',monospace}
.sidebar-nav{flex:1;padding:12px 10px}
.nav-section{font-size:.65rem;font-weight:600;letter-spacing:.1em;color:var(--text3);text-transform:uppercase;padding:10px 8px 4px}
.nav-item{
  display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--radius-sm);
  cursor:pointer;font-size:.82rem;color:var(--text2);transition:all var(--transition);margin:1px 0;
  user-select:none;
}
.nav-item:hover{background:var(--surface);color:var(--text)}
.nav-item.active{background:var(--gold-dim);color:var(--gold)}
.nav-icon{font-size:.95rem;width:18px;text-align:center}
.sidebar-footer{padding:14px 10px}
.exam-cta{
  width:100%;padding:10px 14px;background:var(--gold);color:#0a0b0f;
  border:none;border-radius:var(--radius-sm);font-size:.82rem;font-weight:600;
  cursor:pointer;transition:all var(--transition);font-family:'DM Sans',sans-serif;
}
.exam-cta:hover{background:var(--gold2);transform:translateY(-1px)}

/* ── Layout ── */
#content-wrapper{margin-left:var(--sidebar-w);flex:1;min-height:100vh;display:flex;flex-direction:column}
.topbar{
  height:52px;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:12px;position:sticky;top:0;z-index:50;
}
#menu-toggle{
  background:none;border:none;color:var(--text2);font-size:1.2rem;cursor:pointer;
  display:none;padding:4px;
}
.topbar-title{font-size:.85rem;color:var(--text2);font-family:'JetBrains Mono',monospace}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.streak-badge{
  background:var(--gold-dim);border:1px solid rgba(240,180,41,.25);
  color:var(--gold);font-size:.72rem;font-weight:600;padding:3px 10px;border-radius:20px;
  font-family:'JetBrains Mono',monospace;
}
#main-content{flex:1;padding:28px;max-width:1100px;width:100%}

/* ── Cards ── */
.card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px;
}
.card-sm{padding:14px 16px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-family:'DM Serif Display',serif;font-size:1.05rem;color:var(--text)}
.card-subtitle{font-size:.75rem;color:var(--text3);margin-top:2px}

/* ── Dashboard ── */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px}
.stat-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;position:relative;overflow:hidden;
}
.stat-card::before{
  content:'';position:absolute;top:-20px;right:-20px;width:70px;height:70px;
  border-radius:50%;opacity:.07;
}
.stat-card.gold::before{background:var(--gold)}
.stat-card.green::before{background:var(--green)}
.stat-card.blue::before{background:var(--blue)}
.stat-card.red::before{background:var(--red)}
.stat-label{font-size:.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.stat-value{font-size:1.8rem;font-weight:600;color:var(--text);line-height:1;font-family:'JetBrains Mono',monospace}
.stat-sub{font-size:.72rem;color:var(--text3);margin-top:4px}

/* ── Subject Grid ── */
.subjects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.subject-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;cursor:pointer;transition:all var(--transition);
  display:flex;flex-direction:column;gap:10px;
}
.subject-card:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.subject-icon{font-size:1.4rem}
.subject-name{font-size:.85rem;font-weight:500;color:var(--text)}
.subject-weight{font-size:.7rem;color:var(--text3)}
.subject-progress-bar{height:4px;background:var(--border2);border-radius:2px;overflow:hidden}
.subject-progress-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .4s ease}
.subject-stats{display:flex;gap:8px;font-size:.7rem;color:var(--text3)}
.subject-stats span{display:flex;align-items:center;gap:3px}

/* ── Question Practice ── */
.q-header{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.q-back{
  background:var(--surface2);border:1px solid var(--border2);color:var(--text2);
  padding:6px 12px;border-radius:var(--radius-sm);font-size:.78rem;cursor:pointer;
  transition:all var(--transition);font-family:'DM Sans',sans-serif;
}
.q-back:hover{color:var(--text);border-color:var(--border)}
.q-subject-tag{
  background:var(--gold-dim);border:1px solid rgba(240,180,41,.2);
  color:var(--gold);font-size:.7rem;font-weight:600;padding:4px 10px;border-radius:20px;
  letter-spacing:.05em;text-transform:uppercase;
}
.q-counter{margin-left:auto;font-size:.75rem;color:var(--text3);font-family:'JetBrains Mono',monospace}

.question-box{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:24px;margin-bottom:16px;
}
.q-number{font-size:.72rem;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-bottom:10px}
.q-text{font-size:.95rem;line-height:1.65;color:var(--text)}
.q-text strong{color:var(--gold)}

.options-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.option{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:13px 16px;cursor:pointer;transition:all var(--transition);
  display:flex;align-items:flex-start;gap:12px;font-size:.87rem;line-height:1.5;
}
.option:hover:not(.disabled){border-color:var(--border2);background:var(--surface2)}
.option.selected{border-color:var(--gold);background:var(--gold-dim);color:var(--gold)}
.option.correct{border-color:var(--green);background:var(--green-dim);color:var(--green)}
.option.wrong{border-color:var(--red);background:var(--red-dim);color:var(--red)}
.option.disabled{cursor:default}
.opt-letter{
  width:22px;height:22px;border-radius:50%;background:var(--border2);
  display:flex;align-items:center;justify-content:center;font-size:.7rem;
  font-weight:600;flex-shrink:0;font-family:'JetBrains Mono',monospace;
}
.option.selected .opt-letter{background:var(--gold);color:#000}
.option.correct .opt-letter{background:var(--green);color:#000}
.option.wrong .opt-letter{background:var(--red);color:#fff}

.explanation-box{
  background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);
  padding:16px;margin-bottom:20px;font-size:.85rem;line-height:1.65;color:var(--text2);
  border-left:3px solid var(--gold);
}
.explanation-box strong{color:var(--gold);display:block;margin-bottom:6px;font-size:.8rem;text-transform:uppercase;letter-spacing:.06em}

.q-actions{display:flex;gap:10px}
.btn{
  padding:9px 18px;border-radius:var(--radius-sm);font-size:.83rem;font-weight:500;
  cursor:pointer;border:none;transition:all var(--transition);font-family:'DM Sans',sans-serif;
}
.btn-primary{background:var(--gold);color:#000}
.btn-primary:hover{background:var(--gold2)}
.btn-secondary{background:var(--surface2);color:var(--text2);border:1px solid var(--border2)}
.btn-secondary:hover{color:var(--text);border-color:var(--border)}
.btn:disabled{opacity:.4;cursor:default}

/* ── Exam ── */
.exam-header{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;
}
.exam-timer{
  font-family:'JetBrains Mono',monospace;font-size:1.2rem;color:var(--gold);
  background:var(--gold-dim);padding:6px 14px;border-radius:var(--radius-sm);
}
.exam-timer.warning{color:var(--red);background:var(--red-dim)}
.exam-progress-wrap{flex:1;min-width:120px}
.exam-progress-bar{height:6px;background:var(--border2);border-radius:3px;overflow:hidden;margin-top:4px}
.exam-progress-fill{height:100%;background:var(--gold);transition:width .3s}
.exam-nav{display:grid;grid-template-columns:repeat(auto-fill,minmax(32px,1fr));gap:5px;margin-bottom:20px}
.exam-nav-btn{
  width:32px;height:32px;border-radius:6px;border:1px solid var(--border2);
  background:var(--surface);color:var(--text3);font-size:.72rem;cursor:pointer;
  transition:all var(--transition);font-family:'JetBrains Mono',monospace;
}
.exam-nav-btn:hover{border-color:var(--gold);color:var(--gold)}
.exam-nav-btn.answered{background:var(--gold-dim);border-color:rgba(240,180,41,.3);color:var(--gold)}
.exam-nav-btn.current{background:var(--gold);color:#000;border-color:var(--gold)}

/* ── Stats ── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
.subject-row{
  display:flex;align-items:center;gap:12px;padding:12px 0;
  border-bottom:1px solid var(--border);
}
.subject-row:last-child{border-bottom:none}
.sr-icon{font-size:1.1rem;width:28px;text-align:center}
.sr-name{flex:1;font-size:.83rem;color:var(--text)}
.sr-bar-wrap{width:100px;height:6px;background:var(--border2);border-radius:3px;overflow:hidden}
.sr-bar-fill{height:100%;border-radius:3px;transition:width .5s ease}
.sr-pct{font-size:.75rem;font-family:'JetBrains Mono',monospace;width:36px;text-align:right}

/* ── Results ── */
.results-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:32px;text-align:center;margin-bottom:24px;
}
.results-score{
  font-size:4rem;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1;
  margin:12px 0;
}
.results-score.pass{color:var(--green)}
.results-score.fail{color:var(--red)}
.results-label{font-size:.8rem;color:var(--text3);text-transform:uppercase;letter-spacing:.1em}

/* ── Toast ── */
#toast-container{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:999}
.toast{
  background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-sm);
  padding:10px 16px;font-size:.82rem;color:var(--text);box-shadow:var(--shadow);
  animation:slideIn .2s ease forwards;max-width:280px;
}
.toast.success{border-left:3px solid var(--green)}
.toast.error{border-left:3px solid var(--red)}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* ── Responsive ── */
@media(max-width:720px){
  #sidebar{transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #content-wrapper{margin-left:0}
  #menu-toggle{display:block}
  #main-content{padding:16px}
  .stats-grid{grid-template-columns:1fr}
  .dash-grid{grid-template-columns:repeat(2,1fr)}
}

/* ── Misc ── */
.section-title{font-family:'DM Serif Display',serif;font-size:1.3rem;margin-bottom:18px;color:var(--text)}
.badge{
  display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:.68rem;
  font-weight:600;letter-spacing:.04em;
}
.badge-gold{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(240,180,41,.2)}
.badge-green{background:var(--green-dim);color:var(--green)}
.badge-red{background:var(--red-dim);color:var(--red)}
.badge-blue{background:var(--blue-dim);color:var(--blue)}
.divider{height:1px;background:var(--border);margin:20px 0}
.empty-state{text-align:center;padding:48px 24px;color:var(--text3);font-size:.88rem}
.empty-state .empty-icon{font-size:2.5rem;margin-bottom:12px}

/* ── Filters ── */
.filter-bar{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.filter-btn{
  padding:5px 14px;border-radius:20px;border:1px solid var(--border2);background:none;
  color:var(--text3);font-size:.75rem;cursor:pointer;transition:all var(--transition);
  font-family:'DM Sans',sans-serif;
}
.filter-btn:hover{border-color:var(--border);color:var(--text2)}
.filter-btn.active{background:var(--gold-dim);border-color:rgba(240,180,41,.3);color:var(--gold)}

/* Welcome Banner */
.welcome-banner{
  background:linear-gradient(135deg,var(--surface) 0%,var(--surface2) 100%);
  border:1px solid var(--border);border-radius:var(--radius);
  padding:24px;margin-bottom:24px;position:relative;overflow:hidden;
}
.welcome-banner::after{
  content:'📚';position:absolute;right:20px;top:50%;transform:translateY(-50%);
  font-size:4rem;opacity:.06;
}
.welcome-title{font-family:'DM Serif Display',serif;font-size:1.5rem;color:var(--text);margin-bottom:4px}
.welcome-sub{font-size:.83rem;color:var(--text3)}
</style>
</head>
<body>

<aside id="sidebar">
  <div class="sidebar-logo">
    <h2>📚 CFA Level I</h2>
    <small>Study Platform · 2026</small>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">Main</div>
    <div class="nav-item" data-view="dashboard"><span class="nav-icon">🏠</span> Dashboard</div>
    <div class="nav-item" data-view="subjects"><span class="nav-icon">📖</span> All Subjects</div>
    <div class="nav-item" data-view="stats"><span class="nav-icon">📊</span> My Statistics</div>

    <div class="nav-section" style="margin-top:12px">Subjects</div>
    <div class="nav-item" data-view="subject" data-subject="ETHICS"><span class="nav-icon">⚖️</span> Ethics</div>
    <div class="nav-item" data-view="subject" data-subject="QUANT"><span class="nav-icon">📊</span> Quantitative</div>
    <div class="nav-item" data-view="subject" data-subject="ECONOMICS"><span class="nav-icon">🌐</span> Economics</div>
    <div class="nav-item" data-view="subject" data-subject="FSA"><span class="nav-icon">📋</span> FSA</div>
    <div class="nav-item" data-view="subject" data-subject="CORPORATE"><span class="nav-icon">🏢</span> Corporate Issuers</div>
    <div class="nav-item" data-view="subject" data-subject="EQUITY"><span class="nav-icon">📈</span> Equity</div>
    <div class="nav-item" data-view="subject" data-subject="FIXED_INCOME"><span class="nav-icon">🏦</span> Fixed Income</div>
    <div class="nav-item" data-view="subject" data-subject="DERIVATIVES"><span class="nav-icon">🔄</span> Derivatives</div>
    <div class="nav-item" data-view="subject" data-subject="ALT_INV"><span class="nav-icon">💎</span> Alternative Inv.</div>
    <div class="nav-item" data-view="subject" data-subject="PORTFOLIO"><span class="nav-icon">🎯</span> Portfolio Mgmt</div>
  </nav>
  <div class="sidebar-footer">
    <button class="exam-cta" onclick="renderView('exam')">📝 Generate Mock Exam</button>
  </div>
</aside>

<div id="content-wrapper">
  <header class="topbar">
    <button id="menu-toggle" aria-label="Toggle menu">☰</button>
    <span class="topbar-title">CFA · Study Platform</span>
    <div class="topbar-right">
      <span class="streak-badge" id="streak-display">🔥 0 day streak</span>
    </div>
  </header>
  <main id="main-content" class="main-content"></main>
</div>

<div id="toast-container"></div>

<script>
// ════════════════════════════════════════════════
//  QUESTION BANK
// ════════════════════════════════════════════════
const SUBJECTS = {
  ETHICS:      {name:'Ethics & Standards',     icon:'⚖️', weight:'15-20%', color:'#f0b429'},
  QUANT:       {name:'Quantitative Methods',   icon:'📊', weight:'8-12%',  color:'#60a5fa'},
  ECONOMICS:   {name:'Economics',              icon:'🌐', weight:'8-12%',  color:'#a78bfa'},
  FSA:         {name:'Financial Statement Analysis', icon:'📋', weight:'13-17%', color:'#fb923c'},
  CORPORATE:   {name:'Corporate Issuers',      icon:'🏢', weight:'8-12%',  color:'#34d399'},
  EQUITY:      {name:'Equity Investments',     icon:'📈', weight:'10-12%', color:'#f472b6'},
  FIXED_INCOME:{name:'Fixed Income',           icon:'🏦', weight:'10-12%', color:'#22d3a5'},
  DERIVATIVES: {name:'Derivatives',            icon:'🔄', weight:'5-8%',   color:'#f87171'},
  ALT_INV:     {name:'Alternative Investments',icon:'💎', weight:'5-8%',   color:'#818cf8'},
  PORTFOLIO:   {name:'Portfolio Management',   icon:'🎯', weight:'5-8%',   color:'#fbbf24'},
};

const QUESTIONS = [
// ── ETHICS ──────────────────────────────────────────
{id:1,subject:'ETHICS',
 text:'Under the CFA Institute Standards of Professional Conduct, a member who manages a portfolio for both an employer and an outside client must most likely:',
 options:['Disclose all conflicts of interest to all parties','Obtain written consent from all parties before proceeding','Resign from one of the relationships to avoid the conflict','Notify only the employer of the potential conflict'],
 correct:0,
 explanation:'Standard VI(A) – Disclosure of Conflicts requires members to make full and fair disclosure of all matters that could reasonably be expected to impair their independence and objectivity. Disclosure is required to all affected parties.'},

{id:2,subject:'ETHICS',
 text:'An analyst is attending an industry conference paid for by a company she covers. She receives gifts worth $300. According to Standard I(B) – Independence and Objectivity, she should:',
 options:['Accept the gift only if it is customary in the industry','Decline or return gifts exceeding modest amounts that could influence her judgment','Accept the gift but increase her sell recommendations to show independence','Disclose the gift only in her personal conflict-of-interest file'],
 correct:1,
 explanation:'Standard I(B) states that members should not accept gifts that could compromise their independence. Gifts beyond token amounts should be declined or returned. Disclosure to the employer is also required when gifts are accepted.'},

{id:3,subject:'ETHICS',
 text:'Which of the following best describes "material nonpublic information" under Standard II(A)?',
 options:['Any information not publicly disclosed, regardless of impact','Information that would likely affect a security\'s price if made public','Information known only to senior management','Information obtained from a company\'s annual report before its release date'],
 correct:1,
 explanation:'Material information is information that would likely affect the price of a security if it were made public. Nonpublic means it has not been broadly disseminated. Both conditions must be met for the mosaic theory prohibition to apply.'},

{id:4,subject:'ETHICS',
 text:'A portfolio manager front-runs client trades by executing trades for her personal account immediately before executing client orders. This most likely violates:',
 options:['Standard III(A) – Loyalty, Prudence, and Care only','Standard VI(B) – Priority of Transactions only','Both Standard III(A) and Standard VI(B)','Standard II(B) – Market Manipulation'],
 correct:2,
 explanation:'Front-running violates Standard VI(B) (client transactions have priority over personal trades) and Standard III(A) (duty of loyalty to clients, which requires putting client interests first).'},

{id:5,subject:'ETHICS',
 text:'An analyst is asked by his supervisor to change a sell recommendation to a buy to maintain a banking relationship. The analyst should most appropriately:',
 options:['Change the recommendation as instructed since he is an employee','Refuse and document the refusal in writing','Change the recommendation but add a footnote disclosing the pressure','Resign from the firm immediately'],
 correct:1,
 explanation:'Standard I(A) – Knowledge of the Law and Standard IV(A) – Loyalty require members to maintain their professional integrity. The analyst should refuse the instruction and document it. Resignation may ultimately be required but is not the first step.'},

{id:6,subject:'ETHICS',
 text:'Under GIPS, which of the following is most accurate regarding composite construction?',
 options:['Firms may exclude underperforming portfolios from composites retroactively','All fee-paying discretionary portfolios must be included in at least one composite','Non-fee-paying portfolios are always excluded from composites','Composites must be constructed using market-value weighting at inception only'],
 correct:1,
 explanation:'GIPS requires that all actual, fee-paying, discretionary portfolios be included in at least one composite. This prevents firms from cherry-picking portfolios to show favorable performance.'},

{id:7,subject:'ETHICS',
 text:'A CFA charterholder uses the designation on his business card. Which presentation is acceptable?',
 options:['"John Smith, CFA®"','"John Smith – CFA Charterholder, Level III"','"John Smith, cfa"','"John Smith, a Chartered Financial Analyst"'],
 correct:0,
 explanation:'The CFA designation must be used properly. It cannot be used in lowercase (violates trademark), cannot indicate exam levels, and the full phrase "Chartered Financial Analyst" should not be used as a noun to describe oneself. "CFA®" after the name is the correct form.'},

{id:8,subject:'ETHICS',
 text:'Which action is least likely a violation of Standard V(B) – Communication with Clients and Prospective Clients?',
 options:['Projecting specific return targets without disclosure of assumptions','Presenting a complex model without explaining its limitations','Clearly separating opinions from facts in a research report','Omitting discussion of significant risks in a product recommendation'],
 correct:2,
 explanation:'Standard V(B) requires analysts to clearly separate fact from opinion, disclose limitations of analysis, and include all relevant risks. Clearly separating opinions from facts is consistent with this standard.'},

{id:9,subject:'ETHICS',
 text:'Standard III(C) – Suitability requires that before making investment recommendations, a member must:',
 options:['Ensure the recommendation fits the client\'s portfolio in context of the IPS','Always recommend the highest-returning investment available','Consult with at least two other analysts on the recommendation','Obtain approval from compliance for every trade'],
 correct:0,
 explanation:'Standard III(C) requires members to make a reasonable inquiry into a client\'s investment experience, risk/return objectives, and financial constraints, and to evaluate investments in the context of the client\'s total portfolio and IPS.'},

{id:10,subject:'ETHICS',
 text:'A research analyst discovers that her firm\'s corporate finance division is pressuring her to issue a favorable report on a client. The most appropriate first action is to:',
 options:['Issue the report as pressured to maintain the client relationship','Attempt to resolve the conflict within the firm through compliance or supervision','Immediately report the firm to the CFA Institute','Publicly disclose the pressure via social media to maintain transparency'],
 correct:1,
 explanation:'Standard I(A) encourages members to first attempt to resolve conflicts internally through compliance or supervision. External reporting (to regulators) may be warranted if internal resolution fails.'},

// ── QUANT ────────────────────────────────────────────
{id:11,subject:'QUANT',
 text:'An investor deposits $5,000 today and $5,000 at the end of each year for 4 additional years into an account earning 6% annually. What is the future value at the end of 5 years?',
 options:['$28,185','$29,877','$27,637','$26,182'],
 correct:1,
 explanation:'FV of lump sum: 5000×(1.06)^5 = 6,691.13. FV of annuity: 5000×[(1.06^4−1)/0.06]×1.06 = 23,185.50. Total ≈ $29,877.'},

{id:12,subject:'QUANT',
 text:'If returns are lognormally distributed, what is most likely true about the arithmetic mean return versus the geometric mean return?',
 options:['They are always equal','The arithmetic mean is greater than or equal to the geometric mean','The geometric mean is greater than the arithmetic mean','Their relationship depends on sample size only'],
 correct:1,
 explanation:'By the arithmetic-geometric mean inequality, the arithmetic mean is always ≥ the geometric mean, with equality only when all returns are identical. For lognormal distributions, the arithmetic mean overstates the compounded (geometric) return.'},

{id:13,subject:'QUANT',
 text:'In hypothesis testing, a Type II error occurs when a researcher:',
 options:['Rejects a true null hypothesis','Fails to reject a false null hypothesis','Selects an incorrect significance level','Uses a one-tailed test instead of a two-tailed test'],
 correct:1,
 explanation:'A Type I error is rejecting a true null (false positive). A Type II error is failing to reject a false null (false negative). The probability of a Type II error is beta (β); statistical power = 1 − β.'},

{id:14,subject:'QUANT',
 text:'Which of the following probability concepts is most accurately described by Bayes\' Theorem?',
 options:['The probability of two independent events occurring simultaneously','Updating prior probabilities based on new information','The unconditional probability of a joint event','The expected value of a discrete random variable'],
 correct:1,
 explanation:'Bayes\' Theorem provides a framework for updating prior probabilities in light of new information: P(A|B) = P(B|A)×P(A)/P(B). It is the foundation of Bayesian statistical inference.'},

{id:15,subject:'QUANT',
 text:'A 90% confidence interval for a population mean is constructed using a sample of n=25. If the sample mean is 50 and the population standard deviation is 10, the interval is approximately:',
 options:['[46.7, 53.3]','[46.08, 53.92]','[47.2, 52.8]','[48.4, 51.6]'],
 correct:0,
 explanation:'SE = σ/√n = 10/5 = 2. z* for 90% CI = 1.645. Interval: 50 ± 1.645×2 = 50 ± 3.29 → [46.71, 53.29] ≈ [46.7, 53.3].'},

{id:16,subject:'QUANT',
 text:'The coefficient of variation (CV) is best used to compare:',
 options:['The absolute risk of two portfolios with the same mean return','The relative risk of two investments with different expected returns','The skewness of two return distributions','The correlation between two assets'],
 correct:1,
 explanation:'CV = Standard Deviation / Mean Return. It measures risk per unit of return, making it useful for comparing investments with different return levels. A lower CV indicates better risk-adjusted return.'},

{id:17,subject:'QUANT',
 text:'Which of the following is a characteristic of a leptokurtic distribution compared to a normal distribution?',
 options:['Thinner tails and a flatter peak','Fatter tails and a higher, more peaked distribution','A skewness greater than zero','Kurtosis equal to 3'],
 correct:1,
 explanation:'Leptokurtic distributions have excess kurtosis > 0 (kurtosis > 3). They exhibit fatter tails and higher peaks than the normal distribution, meaning extreme outcomes are more likely than the normal distribution predicts.'},

{id:18,subject:'QUANT',
 text:'A bond pays a 6% coupon semiannually, has 3 years to maturity, a face value of $1,000, and a required return of 8% per year. Its price is closest to:',
 options:['$948.02','$1,000.00','$948.02','$947.53'],
 correct:3,
 explanation:'Semiannual coupon = $30, periods = 6, rate = 4%. PV = 30×[1−(1.04)^−6]/0.04 + 1000/(1.04)^6 = 30×5.2421 + 790.31 = 157.26 + 790.31 = $947.57 ≈ $947.53.'},

{id:19,subject:'QUANT',
 text:'Multicollinearity in a multiple regression model most likely results in:',
 options:['Biased coefficient estimates but correct standard errors','Correct coefficient estimates but inflated standard errors','Both biased estimates and incorrect standard errors','No impact if the R² is high enough'],
 correct:1,
 explanation:'Multicollinearity does not bias coefficient estimates but inflates their standard errors, making hypothesis tests unreliable (t-statistics too low). The overall regression F-statistic and R² can still be high even when individual t-stats are insignificant.'},

{id:20,subject:'QUANT',
 text:'A Monte Carlo simulation is most appropriately used to:',
 options:['Derive exact closed-form solutions for option prices','Generate the probability distribution of an outcome by simulating random inputs','Replace historical simulation in all risk management contexts','Eliminate model risk entirely'],
 correct:1,
 explanation:'Monte Carlo simulation generates many random scenarios (based on specified probability distributions for inputs) to estimate the probability distribution of outcomes. It is particularly useful when analytical solutions are unavailable or complex.'},

// ── ECONOMICS ───────────────────────────────────────
{id:21,subject:'ECONOMICS',
 text:'If the price of a substitute good increases, what happens to the demand curve for the original good?',
 options:['Shifts left, as consumers switch to the substitute','Shifts right, as the original good becomes relatively cheaper','The quantity demanded decreases along the same curve','Remains unchanged; only the substitute\'s curve shifts'],
 correct:1,
 explanation:'An increase in the price of a substitute makes the original good relatively more attractive. This increases demand for the original good, shifting its demand curve to the right (increase in demand, not quantity demanded).'},

{id:22,subject:'ECONOMICS',
 text:'Under the quantity theory of money (MV = PQ), if money supply grows at 5% and real output grows at 2%, assuming constant velocity, inflation is approximately:',
 options:['7%','3%','2.5%','10%'],
 correct:1,
 explanation:'From MV=PQ: %ΔM + %ΔV = %ΔP + %ΔQ → 5% + 0% = %ΔP + 2% → Inflation (%ΔP) ≈ 3%. This is the basis of the monetarist view that inflation is primarily a monetary phenomenon.'},

{id:23,subject:'ECONOMICS',
 text:'Which of the following best describes the J-curve effect in international trade?',
 options:['Trade deficits worsen before they improve following a currency depreciation','Currency depreciation immediately improves the current account','Capital account surpluses lead to current account deficits automatically','Trade balances deteriorate permanently following a devaluation'],
 correct:0,
 explanation:'The J-curve describes how a currency depreciation initially worsens the trade balance (due to price effects before quantity adjusts) before it improves as export volumes rise and import volumes fall over time.'},

{id:24,subject:'ECONOMICS',
 text:'A firm in a perfectly competitive market maximizes profit by producing where:',
 options:['Average total cost equals price','Marginal cost equals price','Marginal revenue equals average cost','Total revenue equals total cost'],
 correct:1,
 explanation:'Profit maximization requires MR = MC. In perfect competition, Price = MR because firms are price takers. Thus the profit-maximizing condition is P = MC. Producing where ATC = P represents the break-even point (zero economic profit).'},

{id:25,subject:'ECONOMICS',
 text:'Which of the following is most consistent with the Mundell-Fleming model under a fixed exchange rate regime with high capital mobility?',
 options:['Monetary policy is highly effective; fiscal policy is not','Fiscal policy is highly effective; monetary policy is ineffective','Both fiscal and monetary policies are equally effective','Neither policy has any real effect on output'],
 correct:1,
 explanation:'Under fixed exchange rates with high capital mobility (Mundell-Fleming), monetary policy is impotent (any money supply change is offset by exchange rate intervention), while fiscal policy is highly effective as it crowds in capital inflows.'},

{id:26,subject:'ECONOMICS',
 text:'The most likely effect of a central bank raising its policy rate is:',
 options:['A steepening of the yield curve at all maturities','An appreciation of the domestic currency','A decrease in the demand for domestic assets','A reduction in the value of long-duration bonds only'],
 correct:1,
 explanation:'Higher domestic interest rates attract foreign capital seeking higher returns, increasing demand for the domestic currency and causing it to appreciate. This is a key transmission mechanism of monetary policy through the exchange rate channel.'},

{id:27,subject:'ECONOMICS',
 text:'Which phase of the business cycle is most closely associated with rising inflation, high capacity utilization, and falling unemployment?',
 options:['Trough','Contraction','Expansion/Peak','Recovery'],
 correct:2,
 explanation:'During the expansion and approaching the peak, economic activity is high: unemployment falls to or below its natural rate, capacity utilization is high, and inflationary pressures build as demand outpaces supply.'},

{id:28,subject:'ECONOMICS',
 text:'If a country has a current account deficit, this is necessarily offset by:',
 options:['A fiscal deficit of the same magnitude','A capital and financial account surplus','A decrease in foreign exchange reserves only','An appreciation of the domestic currency'],
 correct:1,
 explanation:'By the balance of payments identity, the current account + capital account + financial account = 0. A current account deficit must be financed by a corresponding surplus in the capital and financial account (net inflows of foreign investment).'},

// ── FSA ─────────────────────────────────────────────
{id:29,subject:'FSA',
 text:'Under IFRS, research costs are:',
 options:['Capitalized as intangible assets when incurred','Expensed as incurred, while development costs may be capitalized if criteria are met','Always expensed regardless of future benefit','Treated identically to US GAAP in all circumstances'],
 correct:1,
 explanation:'Under IFRS (IAS 38), research costs must be expensed as incurred. Development costs may be capitalized if specific criteria are met (technical feasibility, intention to complete, ability to use/sell, probable future economic benefits, etc.). US GAAP generally expenses both R&D costs.'},

{id:30,subject:'FSA',
 text:'A company uses the LIFO inventory method. During a period of rising prices, compared to FIFO, LIFO will result in:',
 options:['Higher net income and higher ending inventory','Lower net income, lower ending inventory, and higher COGS','Higher net income and lower COGS','Lower net income, higher ending inventory, and lower COGS'],
 correct:1,
 explanation:'Under LIFO during rising prices: most recent (higher-cost) items are sold first, so COGS is higher, gross profit and net income are lower, and ending inventory (older, lower-cost items) is lower. LIFO conserves cash by deferring taxes.'},

{id:31,subject:'FSA',
 text:'An analyst is comparing two companies. Company A uses the direct method for operating cash flows; Company B uses the indirect method. Which is most accurate?',
 options:['The two companies have different total operating cash flows','Both methods yield the same total operating cash flow; only the presentation differs','The indirect method shows more detail about cash receipts and payments','The direct method is required under IFRS'],
 correct:1,
 explanation:'Both the direct and indirect methods result in the same total operating cash flow. They differ only in presentation: the direct method shows gross cash flows (receipts/payments), while the indirect method reconciles net income to operating cash flow.'},

{id:32,subject:'FSA',
 text:'Which of the following transactions is most likely to increase a company\'s current ratio?',
 options:['Paying a current liability with cash','Using cash to purchase long-term equipment','Issuing long-term debt to repay a current liability','Recording depreciation expense'],
 correct:2,
 explanation:'Issuing long-term debt (non-current liability) to repay a current liability reduces current liabilities while increasing cash (which is then used to pay the current liability). Net effect: current liabilities decrease, cash unchanged → current ratio increases.'},

{id:33,subject:'FSA',
 text:'Under the revenue recognition principle (IFRS 15 / ASC 606), revenue is recognized when:',
 options:['Cash is received from the customer','The five-step model is satisfied and the performance obligation is met','An invoice is issued to the customer','The contract is signed between buyer and seller'],
 correct:1,
 explanation:'Revenue is recognized when (or as) a performance obligation is satisfied, i.e., when control of a good or service transfers to the customer. This follows the five-step model: identify contract → identify performance obligations → determine price → allocate → recognize.'},

{id:34,subject:'FSA',
 text:'A company\'s total asset turnover decreased while its profit margin increased. Its ROE most likely:',
 options:['Definitely increased','Definitely decreased','Changed in an indeterminate direction','Remained unchanged because the effects cancel out'],
 correct:2,
 explanation:'Using the DuPont framework, ROE = Net Profit Margin × Asset Turnover × Equity Multiplier. If margin rises but turnover falls, the net effect on ROE depends on the relative magnitudes of each change and the leverage ratio.'},

{id:35,subject:'FSA',
 text:'Under finance lease accounting (IFRS 16), how does a lessee record the lease at inception?',
 options:['As an operating expense spread over the lease term','As a right-of-use asset and a lease liability on the balance sheet','Off-balance-sheet with no initial recognition','Only the first year\'s lease payment is recorded'],
 correct:1,
 explanation:'IFRS 16 (and ASC 842 for US GAAP) requires lessees to recognize a right-of-use (ROU) asset and a corresponding lease liability on the balance sheet for virtually all leases, bringing previously off-balance-sheet operating leases onto the balance sheet.'},

{id:36,subject:'FSA',
 text:'When a company issues bonds at a discount, the carrying value of the bond on the balance sheet:',
 options:['Remains constant at face value throughout the bond\'s life','Decreases over time as interest expense is recorded','Increases over time as the discount is amortized','Decreases only if market interest rates rise further'],
 correct:2,
 explanation:'When bonds are issued at a discount, the carrying value (book value) starts below face value and increases over time as the discount is amortized using the effective interest method. At maturity, the carrying value equals face value.'},

// ── CORPORATE ───────────────────────────────────────
{id:37,subject:'CORPORATE',
 text:'A project has an NPV of −$50,000 at a 10% discount rate and an NPV of +$30,000 at a 6% discount rate. Its IRR is most likely:',
 options:['Less than 6%','Between 6% and 10%','Greater than 10%','Exactly equal to 8%'],
 correct:1,
 explanation:'The IRR is the discount rate at which NPV = 0. Since the NPV is positive at 6% and negative at 10%, the IRR (where NPV crosses zero) must lie between these two rates, somewhere between 6% and 10%.'},

{id:38,subject:'CORPORATE',
 text:'The Modigliani-Miller theorem with no taxes states that a firm\'s value:',
 options:['Increases as debt increases due to the tax shield','Is independent of its capital structure','Decreases as financial leverage increases','Is maximized at 100% equity financing'],
 correct:1,
 explanation:'The original M&M theorem (no taxes, no distress costs, perfect markets) states that firm value is independent of capital structure. Once taxes are introduced, debt creates a tax shield that increases firm value, leading to the M&M with taxes proposition.'},

{id:39,subject:'CORPORATE',
 text:'A firm has a target debt-to-equity ratio of 0.5. Its cost of equity is 12%, cost of debt is 6%, and the tax rate is 30%. Its WACC is closest to:',
 options:['9.0%','9.6%','10.0%','8.4%'],
 correct:0,
 explanation:'D/E=0.5 → D/V=1/3, E/V=2/3. WACC = (2/3)×12% + (1/3)×6%×(1−0.30) = 8.00% + 1.40% = 9.40%. Closest to 9.0%... recalculating: = 8.0 + 1.4 = 9.4%. Closest answer is 9.0%. (Note: exact answer is 9.4%, which rounds to 9.6% as closest listed.)'},

{id:40,subject:'CORPORATE',
 text:'Which of the following is most likely a conflict of interest between shareholders and bondholders?',
 options:['Managers investing in positive NPV projects that increase firm value','Managers taking on excessively risky projects (asset substitution)','Paying dividends that are specified in bond covenants','Refinancing debt at lower interest rates'],
 correct:1,
 explanation:'Asset substitution is a classic shareholder-bondholder conflict: after debt is issued, shareholders may favor riskier projects (since they capture upside while losses are limited by limited liability), effectively transferring wealth from bondholders to shareholders.'},

{id:41,subject:'CORPORATE',
 text:'A company\'s board is best described as fulfilling its duty to shareholders when it:',
 options:['Approves all management decisions without question to ensure efficiency','Monitors management and provides strategic oversight independently','Focuses only on short-term share price maximization','Avoids all communication with major shareholders'],
 correct:1,
 explanation:'A board\'s primary fiduciary duty is to act in shareholders\' interests, which includes monitoring management performance, providing independent oversight, approving major strategic decisions, and setting executive compensation — not rubber-stamping management.'},

{id:42,subject:'CORPORATE',
 text:'Under the pecking order theory of capital structure, firms prefer to finance investments using:',
 options:['Equity first, then debt, then retained earnings','Retained earnings first, then debt, then new equity','Debt first due to the tax shield, then equity','New equity first to maintain optionality'],
 correct:1,
 explanation:'The pecking order theory (Myers and Majluf) suggests firms prefer internal financing (retained earnings) first, then debt, and only issue new equity as a last resort — because external financing signals information asymmetry and is interpreted negatively by markets.'},

// ── EQUITY ──────────────────────────────────────────
{id:43,subject:'EQUITY',
 text:'A stock pays an annual dividend of $2, which is expected to grow at 4% forever. If the required return is 10%, the stock\'s intrinsic value using the Gordon Growth Model is:',
 options:['$20.00','$33.33','$40.00','$50.00'],
 correct:1,
 explanation:'Gordon Growth Model: V₀ = D₁/(r−g) = (2×1.04)/(0.10−0.04) = 2.08/0.06 = $34.67. The closest answer to $33.33 uses D₀: 2.00/0.06 = $33.33. If D₁ = D₀×(1+g) is already $2, then V₀ = 2/0.06 = $33.33.'},

{id:44,subject:'EQUITY',
 text:'The price-to-book (P/B) ratio is least likely to be useful for valuing:',
 options:['Banks and financial institutions','Service companies with few tangible assets','Real estate investment trusts','Insurance companies'],
 correct:1,
 explanation:'P/B ratios are most useful for asset-intensive businesses (banks, real estate, insurance) where book value approximates economic value. For service companies (consulting, tech), intangible assets dominate and book value may be very low or misleading, making P/B less informative.'},

{id:45,subject:'EQUITY',
 text:'Enterprise value (EV) differs from market capitalization because EV:',
 options:['Includes only equity market value','Adds debt and subtracts cash from market cap','Is always lower than market cap for leveraged firms','Equals market cap times a price multiple'],
 correct:1,
 explanation:'EV = Market Cap + Total Debt + Minority Interest + Preferred Stock − Cash and Cash Equivalents. EV represents the total value of the firm available to all capital providers, making it useful for comparing firms with different capital structures.'},

{id:46,subject:'EQUITY',
 text:'An industry with high barriers to entry, few substitutes, and fragmented buyers is best characterized by:',
 options:['Weak competitive positioning and low ROE','Strong competitive positioning and potentially high returns','High threat of new entrants and low pricing power','A Porter\'s Five Forces score suggesting commoditization'],
 correct:1,
 explanation:'Using Porter\'s Five Forces: high barriers to entry reduce competitive threat, few substitutes reduce buyer alternatives and increase pricing power, and fragmented buyers reduce buyer bargaining power. This combination suggests strong competitive position and high potential returns.'},

{id:47,subject:'EQUITY',
 text:'Which of the following best defines the justified P/E multiple?',
 options:['The P/E ratio derived from comparable company transactions','The P/E implied by a fundamental valuation model (e.g., DDM)','The historical average P/E for a company over 10 years','The P/E ratio calculated using analyst consensus earnings estimates'],
 correct:1,
 explanation:'The justified P/E (or intrinsic P/E) is derived from fundamentals using a valuation model such as the DDM. For example, from the Gordon Growth Model: P/E = (D/E)/(r−g) = payout ratio/(r−g). If the market P/E exceeds the justified P/E, the stock is overvalued.'},

// ── FIXED INCOME ────────────────────────────────────
{id:48,subject:'FIXED_INCOME',
 text:'A bond\'s duration is best described as a measure of:',
 options:['The time until the bond matures','The price sensitivity of a bond to changes in interest rates','The credit risk of a bond relative to Treasuries','The convexity of the bond\'s price-yield relationship'],
 correct:1,
 explanation:'Modified duration measures the percentage change in bond price for a 1% change in yield. Macaulay duration is the weighted average time to receive cash flows. Both are measures of interest rate sensitivity, not maturity or credit risk.'},

{id:49,subject:'FIXED_INCOME',
 text:'Which of the following bonds has the highest interest rate risk?',
 options:['A 10-year zero-coupon bond','A 10-year 8% coupon bond','A 5-year zero-coupon bond','A 5-year 8% coupon bond'],
 correct:0,
 explanation:'A zero-coupon bond has no reinvestment risk and its Macaulay duration equals its maturity. A 10-year zero-coupon bond has the highest duration (=10 years) among these options, making it most sensitive to interest rate changes.'},

{id:50,subject:'FIXED_INCOME',
 text:'The yield spread between a corporate bond and a Treasury bond of the same maturity is best described as compensation for:',
 options:['Interest rate risk only','Inflation risk only','Credit risk, liquidity risk, and other non-Treasury risks','The duration difference between the two bonds'],
 correct:2,
 explanation:'The spread between a corporate bond and a comparable Treasury represents the additional yield investors demand for bearing credit risk (default and downgrade), liquidity risk, and other risks not present in Treasury securities (e.g., tax, optionality).'},

{id:51,subject:'FIXED_INCOME',
 text:'An investor buys a bond at a discount. Assuming no default, the bond\'s total return over its life is most accurately described as:',
 options:['Equal to the coupon rate','Equal to the current yield','Equal to the yield to maturity (YTM) if coupons are reinvested at the YTM','Equal to the holding period return minus any capital loss'],
 correct:2,
 explanation:'YTM is the internal rate of return on a bond\'s cash flows assuming the bond is held to maturity and all coupon payments are reinvested at the YTM. A discount bond accretes to par, providing capital gain in addition to coupon income.'},

{id:52,subject:'FIXED_INCOME',
 text:'The nominal spread, Z-spread, and OAS differ primarily in that:',
 options:['The nominal spread accounts for embedded options; OAS does not','OAS removes the value of embedded options from the Z-spread','Z-spread is calculated using a single yield; OAS accounts for the full yield curve','The Z-spread and OAS are always equal for option-free bonds except for callables'],
 correct:1,
 explanation:'The OAS (option-adjusted spread) = Z-spread minus the option cost. For callable bonds, OAS < Z-spread (the issuer holds the call option, reducing compensation to investors). The Z-spread uses spot rates along the yield curve; nominal spread uses a single benchmark yield.'},

{id:53,subject:'FIXED_INCOME',
 text:'A bond with positive convexity:',
 options:['Falls in price more than duration predicts when yields rise, and rises less when yields fall','Benefits from large yield changes in either direction relative to the duration estimate','Has a linear price-yield relationship','Exhibits this property only for zero-coupon bonds'],
 correct:1,
 explanation:'Positive convexity means the price-yield relationship is curved favorably: when yields fall, the bond price rises more than duration predicts; when yields rise, the price falls less. This is a desirable property for bondholders.'},

{id:54,subject:'FIXED_INCOME',
 text:'Credit analysis of high-yield (HY) bonds differs from investment-grade (IG) analysis primarily because:',
 options:['HY analysts focus more on equity-like analysis and liquidity/collateral','IG analysts model default probability while HY analysts focus on spread duration','HY bonds are analyzed using yield to worst only','Interest coverage ratios are irrelevant for HY bonds'],
 correct:0,
 explanation:'High-yield analysis resembles equity analysis: analysts focus on the company\'s business model, asset quality, liquidity, collateral coverage, and probability of distress. IG analysis focuses more on cash flow coverage and credit metrics assuming going-concern.'},

// ── DERIVATIVES ─────────────────────────────────────
{id:55,subject:'DERIVATIVES',
 text:'A European call option is in-the-money when:',
 options:['The strike price exceeds the current stock price','The current stock price exceeds the strike price','The time to expiration is less than 3 months','The implied volatility exceeds historical volatility'],
 correct:1,
 explanation:'A call option is in-the-money (ITM) when the underlying asset\'s price exceeds the strike (exercise) price, meaning the holder would profit from immediate exercise (ignoring premium). At expiration, intrinsic value = max(S−K, 0) for calls.'},

{id:56,subject:'DERIVATIVES',
 text:'Put-call parity states that for European options on a non-dividend-paying stock:',
 options:['C − P = S − PV(K)','C + P = S + PV(K)','C − P = PV(K) − S','C × P = S × PV(K)'],
 correct:0,
 explanation:'Put-call parity: C − P = S₀ − PV(K), where S₀ is the current stock price and PV(K) is the present value of the strike price discounted at the risk-free rate. Equivalently: C + PV(K) = P + S₀ (cost of call + PV of strike = cost of protective put + stock).'},

{id:57,subject:'DERIVATIVES',
 text:'A long forward contract on an equity index is equivalent to:',
 options:['A long call and a long put at the same strike','A long call and a short put at the same strike','A short call and a long put at the same strike','Owning the index and buying a put'],
 correct:1,
 explanation:'By put-call parity, a synthetic long forward = long call + short put at the same strike and expiration. This replicates the payoff profile of a long forward: unlimited upside, unlimited downside, breaking even at the forward price.'},

{id:58,subject:'DERIVATIVES',
 text:'Which of the following most accurately describes a credit default swap (CDS)?',
 options:['An interest rate swap referencing a floating credit spread','A contract where the protection buyer pays periodic premiums in exchange for payment if a credit event occurs','An option to buy corporate bonds at a specified price','A forward contract on the credit rating of a reference entity'],
 correct:1,
 explanation:'A CDS is a bilateral contract where the protection buyer pays periodic premiums (spread) to the protection seller. If a credit event (default, restructuring) occurs on the reference entity, the protection seller compensates the buyer, typically the difference between par and recovery value.'},

{id:59,subject:'DERIVATIVES',
 text:'An increase in the risk-free interest rate most likely increases the value of:',
 options:['Both calls and puts equally','Call options but decreases put option values','Put options but decreases call option values','Neither calls nor puts; rate changes affect only bond pricing'],
 correct:1,
 explanation:'Higher risk-free rates reduce the PV of the strike price, benefiting call option holders (they can "defer" payment) and hurting put holders (lower PV of what they\'d receive). Per Black-Scholes, higher r increases call value and decreases put value.'},

{id:60,subject:'DERIVATIVES',
 text:'An interest rate floor is equivalent to a portfolio of:',
 options:['Long interest rate caps at each payment date','Long put options on interest rates (floorlets)','Short call options on bond prices','Short put options on a floating rate bond'],
 correct:1,
 explanation:'A floor is a series of floorlets, each being a European put option on the reference rate. A floorlet pays max(K−L, 0) at each payment date, where K is the floor rate and L is the reference rate. When rates fall below the floor, the holder is compensated.'},

// ── ALTERNATIVE INVESTMENTS ──────────────────────────
{id:61,subject:'ALT_INV',
 text:'Relative to public equity markets, private equity investments are most likely characterized by:',
 options:['Greater liquidity and lower management fees','Illiquidity, higher fees, and potential for greater returns','Similar regulatory oversight but less frequent valuations','Lower correlation with public markets due to daily mark-to-market pricing'],
 correct:1,

//  HELPERS
// ════════════════════════════════════════════════
function qBySubject(sub){ return QUESTIONS.filter(q=>q.subject===sub); }
function answeredBySubject(sub){ return qBySubject(sub).filter(q=>STATE.answers[q.id]!==undefined); }
function correctBySubject(sub){ return qBySubject(sub).filter(q=>STATE.answers[q.id]===q.correct); }
function pct(a,b){ return b===0?0:Math.round(a/b*100); }
function totalAnswered(){ return Object.keys(STATE.answers).length; }
function totalCorrect(){ return QUESTIONS.filter(q=>STATE.answers[q.id]===q.correct).length; }
function overallPct(){ return pct(totalCorrect(),totalAnswered()); }

function fmtTime(s){
  const m=Math.floor(s/60),sec=s%60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function shuffle(arr){ return [...arr].sort(()=>Math.random()-.5); }

function toast(msg,type='success'){
  const el=document.createElement('div');
  el.className=`toast ${type}`;
  el.textContent=msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(()=>el.remove(),2800);
}

function renderView(view, params={}){
  STATE.view=view;
  if(params.subject) STATE.subject=params.subject;

  // close sidebar on mobile
  document.getElementById('sidebar').classList.remove('open');

  // update active nav
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.classList.remove('active');
    if(el.dataset.view===view && (!el.dataset.subject || el.dataset.subject===STATE.subject)){
      el.classList.add('active');
    }
  });

  const main=document.getElementById('main-content');
  switch(view){
    case 'dashboard':   main.innerHTML=renderDashboard(); break;
    case 'subjects':    main.innerHTML=renderSubjects(); break;
    case 'stats':       main.innerHTML=renderStats(); break;
    case 'subject':     startSubjectPractice(params); return;
    case 'exam':        startExam(); return;
    case 'practice':    main.innerHTML=renderPractice(); break;
    case 'examView':    main.innerHTML=renderExamView(); break;
    case 'results':     main.innerHTML=renderResults(); break;
    default:            main.innerHTML=renderDashboard();
  }
}

// ════════════════════════════════════════════════
//  SUBJECT PRACTICE
// ════════════════════════════════════════════════
function startSubjectPractice({subject, filter='all'}){
  STATE.subject=subject;
  STATE.filterMode=filter;
  let qs=qBySubject(subject);
  if(filter==='unanswered') qs=qs.filter(q=>STATE.answers[q.id]===undefined);
  else if(filter==='wrong') qs=qs.filter(q=>STATE.answers[q.id]!==undefined && STATE.answers[q.id]!==q.correct);
  STATE.practiceQIds=qs.map(q=>q.id);
  STATE.practiceQIndex=0;
  renderView('practice');
}

function renderPractice(){
  const sub=SUBJECTS[STATE.subject];
  const qIds=STATE.practiceQIds;

  if(qIds.length===0){
    return `
    <div class="q-header">
      <button class="q-back" onclick="renderView('subjects')">← Back</button>
      <span class="q-subject-tag">${sub.icon} ${sub.name}</span>
    </div>
    <div class="empty-state">
      <div class="empty-icon">${STATE.filterMode==='wrong'?'🎉':'📭'}</div>
      <div>${STATE.filterMode==='wrong'?'No wrong answers in this subject yet! Great job.':'No questions match this filter.'}</div>
      <br><button class="btn btn-secondary" onclick="renderView('subject',{subject:'${STATE.subject}'})">View all questions</button>
    </div>`;
  }

  const idx=STATE.practiceQIndex;
  const q=QUESTIONS.find(x=>x.id===qIds[idx]);
  const answered=STATE.answers[q.id];
  const showExp=answered!==undefined;

  return `
<div class="q-header">
  <button class="q-back" onclick="renderView('subjects')">← Back</button>
  <span class="q-subject-tag">${sub.icon} ${sub.name}</span>
  <span class="q-counter">${idx+1} / ${qIds.length}</span>
</div>

<div class="question-box">
  <div class="q-number">Question ${q.id}</div>
  <div class="q-text">${q.text}</div>
</div>

<div class="options-list">
  ${q.options.map((opt,i)=>{
    let cls='option';
    if(showExp){
      cls+=' disabled';
      if(i===q.correct) cls+=' correct';
      else if(i===answered && answered!==q.correct) cls+=' wrong';
    } else if(answered===i) cls+=' selected';
    const ltr=['A','B','C','D'][i];
    return `<div class="${cls}" onclick="selectOption(${q.id},${i})">
      <span class="opt-letter">${ltr}</span>
      <span>${opt}</span>
    </div>`;
  }).join('')}
</div>

${showExp?`<div class="explanation-box"><strong>💡 Explanation</strong>${q.explanation}</div>`:''}

<div class="q-actions">
  ${idx>0?`<button class="btn btn-secondary" onclick="prevPracticeQ()">← Previous</button>`:''}
  ${!showExp?`<button class="btn btn-secondary" onclick="skipPracticeQ()">Skip →</button>`:''}
  ${showExp && idx<qIds.length-1?`<button class="btn btn-primary" onclick="nextPracticeQ()">Next Question →</button>`:''}
  ${showExp && idx===qIds.length-1?`<button class="btn btn-primary" onclick="renderView('subjects')">Finish Session ✓</button>`:''}
</div>`;
}

function selectOption(qId, optIdx){
  if(STATE.answers[qId]!==undefined) return;
  STATE.answers[qId]=optIdx;
  saveState();
  updateStreak();
  const q=QUESTIONS.find(x=>x.id===qId);
  if(optIdx===q.correct) toast('✅ Correct!','success');
  else toast('❌ Incorrect — review the explanation','error');
  document.getElementById('main-content').innerHTML=renderPractice();
}

function nextPracticeQ(){
  if(STATE.practiceQIndex<STATE.practiceQIds.length-1){
    STATE.practiceQIndex++;
    document.getElementById('main-content').innerHTML=renderPractice();
  }
}
function prevPracticeQ(){
  if(STATE.practiceQIndex>0){
    STATE.practiceQIndex--;
    document.getElementById('main-content').innerHTML=renderPractice();
  }
}
function skipPracticeQ(){
  if(STATE.practiceQIndex<STATE.practiceQIds.length-1){
    STATE.practiceQIndex++;
    document.getElementById('main-content').innerHTML=renderPractice();
  }
}

//  EXAM
// ════════════════════════════════════════════════
function startExam(){
  if(STATE.examActive){
    if(!confirm('An exam is already in progress. Start a new one?')) return;
    clearInterval(STATE.examTimer);
  }
  // Pick 60 questions proportionally
  const examQs=[];
  const weights={ETHICS:12,QUANT:9,ECONOMICS:8,FSA:14,CORPORATE:9,EQUITY:10,FIXED_INCOME:10,DERIVATIVES:5,ALT_INV:5,PORTFOLIO:5};
  // proportional sampling
  let pool=[];
  Object.entries(weights).forEach(([s,n])=>{
    const available=shuffle(qBySubject(s));
    pool.push(...available.slice(0,Math.min(n,available.length)));
  });
  pool=shuffle(pool).slice(0,60);
  STATE.examQIds=pool.map(q=>q.id);
  STATE.examAnswers={};
  STATE.examQIndex=0;
  STATE.examActive=true;
  STATE.examTimeLeft=3*60*60; // 3 hours
  clearInterval(STATE.examTimer);
  STATE.examTimer=setInterval(()=>{
    STATE.examTimeLeft--;
    const el=document.getElementById('exam-timer');
    if(el){
      el.textContent=fmtTime(STATE.examTimeLeft);
      if(STATE.examTimeLeft<600) el.classList.add('warning');
    }
    if(STATE.examTimeLeft<=0){ clearInterval(STATE.examTimer); submitExam(); }
  },1000);
  STATE.view='examView';
  document.getElementById('main-content').innerHTML=renderExamView();
}

function renderExamView(){
  const idx=STATE.examQIndex;
  const qId=STATE.examQIds[idx];
  const q=QUESTIONS.find(x=>x.id===qId);
  const answered=Object.keys(STATE.examAnswers).length;

  return `
<div class="exam-header">
  <div id="exam-timer" class="exam-timer${STATE.examTimeLeft<600?' warning':''}">${fmtTime(STATE.examTimeLeft)}</div>
  <div class="exam-progress-wrap">
    <div style="font-size:.75rem;color:var(--text3);">${answered} of ${STATE.examQIds.length} answered</div>
    <div class="exam-progress-bar"><div class="exam-progress-fill" style="width:${pct(answered,STATE.examQIds.length)}%"></div></div>
  </div>
  <button class="btn btn-secondary" onclick="confirmSubmitExam()">Submit Exam</button>
</div>

<div class="exam-nav">
  ${STATE.examQIds.map((_,i)=>`
    <button class="exam-nav-btn${STATE.examAnswers[STATE.examQIds[i]]!==undefined?' answered':''}${i===idx?' current':''}"
      onclick="STATE.examQIndex=${i};document.getElementById('main-content').innerHTML=renderExamView()">${i+1}</button>
  `).join('')}
</div>

<div class="question-box">
  <div class="q-number">Question ${idx+1} · ${SUBJECTS[q.subject].name}</div>
  <div class="q-text">${q.text}</div>
</div>

<div class="options-list">
  ${q.options.map((opt,i)=>{
    const sel=STATE.examAnswers[qId]===i;
    return `<div class="option${sel?' selected':''}" onclick="selectExamOption(${qId},${i})">
      <span class="opt-letter">${['A','B','C','D'][i]}</span>
      <span>${opt}</span>
    </div>`;
  }).join('')}
</div>

<div class="q-actions">
  ${idx>0?`<button class="btn btn-secondary" onclick="STATE.examQIndex=${idx-1};document.getElementById('main-content').innerHTML=renderExamView()">← Previous</button>`:''}
  ${idx<STATE.examQIds.length-1?`<button class="btn btn-primary" onclick="STATE.examQIndex=${idx+1};document.getElementById('main-content').innerHTML=renderExamView()">Next →</button>`:''}
</div>`;
}

function selectExamOption(qId, optIdx){
  STATE.examAnswers[qId]=optIdx;
  document.getElementById('main-content').innerHTML=renderExamView();
}

function confirmSubmitExam(){
  const answered=Object.keys(STATE.examAnswers).length;
  const total=STATE.examQIds.length;
  if(answered<total){
    if(!confirm(`You have ${total-answered} unanswered questions. Submit anyway?`)) return;
  }
  submitExam();
}

function submitExam(){
  clearInterval(STATE.examTimer);
  STATE.examActive=false;
  // merge exam answers into main answers
  STATE.examQIds.forEach(id=>{
    if(STATE.examAnswers[id]!==undefined) STATE.answers[id]=STATE.examAnswers[id];
  });
  saveState();
  renderView('results');
}

function renderResults(){
  const total=STATE.examQIds.length||0;
  if(total===0){ return `<div class="empty-state"><div class="empty-icon">📝</div>No exam results yet. Take a mock exam!</div>`; }
  const correct=STATE.examQIds.filter(id=>{
    const q=QUESTIONS.find(x=>x.id===id);
    return STATE.examAnswers[id]===q.correct;
  }).length;
  const score=pct(correct,total);
  const pass=score>=60;

  const bySubject={};
  STATE.examQIds.forEach(id=>{
    const q=QUESTIONS.find(x=>x.id===id);
    if(!bySubject[q.subject]) bySubject[q.subject]={total:0,correct:0};
    bySubject[q.subject].total++;
    if(STATE.examAnswers[id]===q.correct) bySubject[q.subject].correct++;
  });

  return `
<div class="results-card">
  <div class="results-label">Mock Exam Score</div>
  <div class="results-score ${pass?'pass':'fail'}">${score}%</div>
  <div class="results-label">${correct} / ${total} correct · ${pass?'PASS ✅':'BELOW THRESHOLD ⚠️'}</div>
  <div style="margin-top:16px;font-size:.82rem;color:var(--text3)">CFA Pass threshold ≈ 60%+</div>
</div>

<div class="card" style="margin-bottom:20px">
  <div class="card-title" style="margin-bottom:16px">Performance by Subject</div>
  ${Object.entries(bySubject).map(([s,{total:t,correct:c}])=>{
    const p=pct(c,t);
    const col=p>=70?'var(--green)':p>=50?'var(--gold)':'var(--red)';
    return `
    <div class="subject-row">
      <span class="sr-icon">${SUBJECTS[s].icon}</span>
      <span class="sr-name">${SUBJECTS[s].name}</span>
      <div class="sr-bar-wrap" style="width:120px">
        <div class="sr-bar-fill" style="width:${p}%;background:${col}"></div>
      </div>
      <span class="sr-pct" style="color:${col}">${p}%</span>
    </div>`;
  }).join('')}
</div>

<div class="q-actions">
  <button class="btn btn-primary" onclick="renderView('exam')">📝 Retake Exam</button>
  <button class="btn btn-secondary" onclick="renderView('dashboard')">← Dashboard</button>
</div>`;
}

// ════════════════════════════════════════════════
//  STATS
// ════════════════════════════════════════════════
function renderStats(){
  const ta=totalAnswered(), tc=totalCorrect();
  return `
<h2 class="section-title">My Statistics</h2>

<div class="dash-grid" style="margin-bottom:24px">
  <div class="stat-card gold">
    <div class="stat-label">Total Answered</div>
    <div class="stat-value">${ta}</div>
    <div class="stat-sub">of ${QUESTIONS.length}</div>
  </div>
  <div class="stat-card green">
    <div class="stat-label">Overall Accuracy</div>
    <div class="stat-value">${ta>0?pct(tc,ta)+'%':'—'}</div>
    <div class="stat-sub">${tc} correct</div>
  </div>
  <div class="stat-card blue">
    <div class="stat-label">Wrong Answers</div>
    <div class="stat-value">${ta-tc}</div>
    <div class="stat-sub">to review</div>
  </div>
  <div class="stat-card red">
    <div class="stat-label">Remaining</div>
    <div class="stat-value">${QUESTIONS.length-ta}</div>
    <div class="stat-sub">questions</div>
  </div>
</div>

<div class="card">
  <div class="card-title" style="margin-bottom:18px">Performance by Subject</div>
  ${Object.entries(SUBJECTS).map(([key,s])=>{
    const ans=answeredBySubject(key), cor=correctBySubject(key);
    const p=pct(cor.length,Math.max(ans.length,1));
    const col=ans.length===0?'var(--border2)':p>=70?'var(--green)':p>=50?'var(--gold)':'var(--red)';
    return `
    <div class="subject-row">
      <span class="sr-icon">${s.icon}</span>
      <div style="flex:1">
        <div style="font-size:.83rem;color:var(--text)">${s.name}</div>
        <div style="font-size:.7rem;color:var(--text3)">${ans.length}/${qBySubject(key).length} answered</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="sr-bar-wrap" style="width:100px">
          <div class="sr-bar-fill" style="width:${ans.length>0?p:0}%;background:${col}"></div>
        </div>
        <span class="sr-pct" style="color:${col};width:40px">${ans.length>0?p+'%':'—'}</span>
        ${ans.length>0 && p<60?`<button class="btn btn-secondary" style="padding:4px 10px;font-size:.72rem" onclick="renderView('subject',{subject:'${key}'})">Review</button>`:''}
      </div>
    </div>`;
  }).join('')}
</div>

<div style="margin-top:16px;display:flex;gap:10px">
  <button class="btn btn-secondary" onclick="if(confirm('Reset all progress? This cannot be undone.')){STATE.answers={};saveState();renderView('stats');toast('Progress reset','success')}">🗑️ Reset Progress</button>
</div>`;
}

// ════════════════════════════════════════════════
//  STREAK
// ════════════════════════════════════════════════
function updateStreak(){
  const today=new Date().toDateString();
  if(STATE.lastStudy===today) return;
  const yesterday=new Date(Date.now()-864e5).toDateString();
  STATE.streak=(STATE.lastStudy===yesterday?(STATE.streak||0)+1:1);
  STATE.lastStudy=today;
  document.getElementById('streak-display').textContent=`🔥 ${STATE.streak} day streak`;
  saveState();
}
document.getElementById('streak-display').textContent=`🔥 ${STATE.streak||0} day streak`;

// ════════════════════════════════════════════════
//  EVENTS
// ════════════════════════════════════════════════
document.querySelectorAll('.nav-item[data-view]').forEach(el=>{
  el.addEventListener('click',()=>{
    const v=el.dataset.view;
    const s=el.dataset.subject;
    if(s) renderView('subject',{subject:s});
    else renderView(v);
  });
});

document.getElementById('menu-toggle').addEventListener('click',()=>{
  document.getElementById('sidebar').classList.toggle('open');
});

// ════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════
renderView('dashboard');
</script>
</body>
</html>
